<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="100%" height="auto">
  <!-- Google Fonts import is not supported inside img tags, so we use standard system sans-serif fonts optimized for modern IDEs/Browsers -->
  <defs>
    <linearGradient id="marrakashGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E25822" />
      <stop offset="100%" stop-color="#FF7A45" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0B0E14" />
      <stop offset="100%" stop-color="#151B26" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    /* Custom Keyframes */
    @keyframes drawBorder {
      to { stroke-dashoffset: 0; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }
    @keyframes floatElement {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    @keyframes fadeInWord {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Styles */
    .bg-card {
      fill: url(#darkGrad);
      stroke: #21262D;
      stroke-width: 1.5;
    }
    .border-glow {
      stroke: url(#marrakashGrad);
      stroke-width: 2;
      stroke-dasharray: 2280;
      stroke-dashoffset: 2280;
      animation: drawBorder 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    .title {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Outfit', 'Inter', sans-serif;
      font-weight: 800;
      font-size: 38px;
      fill: url(#marrakashGrad);
      filter: drop-shadow(0px 2px 8px rgba(226, 88, 34, 0.4));
    }
    .badge {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      fill: #FF9E7D;
      opacity: 0;
      animation: fadeIn 1s ease-out 0.5s forwards;
    }
    .subtitle-box {
      opacity: 0;
      animation: slideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
    }
    .subtitle-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      font-weight: 500;
      font-size: 17px;
      fill: #8B949E;
    }
    .pet-icon {
      animation: floatElement 4s ease-in-out infinite;
      transform-origin: center;
    }
    .glow-circle {
      animation: pulseGlow 3s ease-in-out infinite;
    }
  </style>

  <!-- Background Base Card -->
  <rect class="bg-card" width="100%" height="100%" rx="16" />
  <rect class="border-glow" width="100%" height="100%" rx="16" fill="none" />

  <!-- Background Glow Accents -->
  <circle class="glow-circle" cx="800" cy="80" r="140" fill="#E25822" opacity="0.4" filter="url(#glow)" />
  <circle class="glow-circle" cx="100" cy="180" r="80" fill="#FF7A45" opacity="0.15" filter="url(#glow)" />

  <!-- Logo Icon Group (Floating Pet & Agro Elements) -->
  <g class="pet-icon" transform="translate(680, 50)">
    <!-- Shield / Badge Frame -->
    <path d="M 60,0 L 120,30 L 120,90 C 120,130 90,150 60,160 C 30,150 0,130 0,90 L 0,30 Z" fill="#161B22" stroke="url(#marrakashGrad)" stroke-width="2" />
    <!-- Wheat/Leaf (Agro) -->
    <path d="M 45,55 Q 60,35 60,75 M 60,55 Q 75,35 75,75" stroke="#FF9E7D" stroke-width="3" stroke-linecap="round" fill="none" />
    <path d="M 60,35 Q 60,115 60,115" stroke="url(#marrakashGrad)" stroke-width="3.5" stroke-linecap="round" />
    <!-- Paw Print (Pet) -->
    <circle cx="60" cy="95" r="11" fill="url(#marrakashGrad)" />
    <circle cx="45" cy="80" r="5" fill="#FF9E7D" />
    <circle cx="75" cy="80" r="5" fill="#FF9E7D" />
    <circle cx="37" cy="93" r="5.5" fill="#FF9E7D" />
    <circle cx="83" cy="93" r="5.5" fill="#FF9E7D" />
  </g>

  <!-- Text Header Section -->
  <g transform="translate(65, 75)">
    <!-- Badge -->
    <text class="badge" x="0" y="0">PORTFÓLIO DE ENGENHARIA MOBILE</text>
    
    <!-- Main Animated Title -->
    <text class="title" x="0" y="42">AgroPet Lambari</text>
    
    <!-- Typing/Fading Subtitle Text -->
    <g class="subtitle-box" transform="translate(0, 75)">
      <!-- Background plate for text contrast -->
      <rect width="525" height="32" rx="6" fill="#161B22" stroke="#21262D" stroke-width="1" />
      <text class="subtitle-text" x="15" y="21">Seja muito bem-vindo ao meu projeto AgroPet Lambari, Leitor! 👋</text>
    </g>
  </g>
</svg>
