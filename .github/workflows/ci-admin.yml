name: CI - Admin

on:
  push:
    branches: [main]
    paths:
      - 'agropet-admin/**'
  pull_request:
    branches: [main]
    paths:
      - 'agropet-admin/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agropet-admin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: agropet-admin/package-lock.json

      - run: npm ci
      - run: npm test -- --runInBand
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL || '' }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY || '' }}
