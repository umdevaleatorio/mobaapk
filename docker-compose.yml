name: agropet-local

services:
  # ─── PostgreSQL + PgBouncer ──────────────────────────
  postgres:
    image: supabase/postgres:15.6.1.028
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-agropet}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgBouncer:
    image: bitnami/pgbouncer:1.23
    ports:
      - "6543:6432"
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: "5432"
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRESQL_DATABASE: ${POSTGRES_DB:-agropet}
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_DEFAULT_POOL_SIZE: "25"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Supabase Services ──────────────────────────────
  gotrue:
    image: supabase/gotrue:v2.158.1
    ports:
      - "9999:9999"
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-agropet}
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-key-change-in-production}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_DISABLE_SIGNUP: "false"
    depends_on:
      postgres:
        condition: service_healthy

  realtime:
    image: supabase/realtime:v2.29.33
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-agropet}
      DB_SSL: "false"
      JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-key-change-in-production}
      REPLICATION_MODE: RLS
    depends_on:
      postgres:
        condition: service_healthy

  storage:
    image: supabase/storage-api:v1.11.13
    ports:
      - "5000:5000"
    environment:
      ANON_KEY: ${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example}
      SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example}
      POSTGREST_URL: http://postgrest:3000
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-key-change-in-production}
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
    volumes:
      - storage-data:/var/lib/storage
    depends_on:
      postgrest:
        condition: service_healthy

  postgrest:
    image: postgrest/postgrest:v12.2.3
    ports:
      - "3000:3000"
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-agropet}
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: postgres
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy

  studio:
    image: supabase/studio:20250101-6e6c0e8
    ports:
      - "8080:8080"
    environment:
      SUPABASE_URL: http://localhost:3000
      STUDIO_PG_META_URL: http://pgmeta:8081
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example}
    depends_on:
      postgres:
        condition: service_healthy
      pgmeta:
        condition: service_healthy

  pgmeta:
    image: supabase/pgmeta:v0.80.0
    ports:
      - "8081:8081"
    environment:
      PG_META_PORT: "8081"
      PG_META_DB_HOST: postgres
      PG_META_DB_PORT: "5432"
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PG_META_DB_NAME: ${POSTGRES_DB:-agropet}
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Edge Functions (local runner) ──────────────────
  edge-functions:
    image: supabase/edge-runtime:v1.58.4
    ports:
      - "9000:9000"
    environment:
      EDGE_RUNTIME_PORT: "9000"
      EDGE_RUNTIME_DENO_DIR: /deno-dir
      SUPABASE_URL: http://postgrest:3000
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example}
    volumes:
      - ./supabase/edge-functions:/functions
    working_dir: /functions
    entrypoint: ["edge-runtime", "start", "--main-service", "/functions"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  storage-data:
